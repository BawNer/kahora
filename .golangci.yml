version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - prealloc
    - bodyclose
    - copyloopvar
    - gocritic

  settings:
    gocritic:
      enabled-tags:
        - performance
        - style
        - diagnostic
      disabled-checks:
        - typeUnparen
        - whyNoLint

  exclusions:
    rules:
      # Tests are allowed to be more lax.
      - path: _test\.go
        linters:
          - errcheck
          - prealloc
      # Benchmarks intentionally discard return values.
      - path: bench_test\.go
        linters:
          - errcheck
          - gocritic